services:
  web:
    build: .
    expose:
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./portfolio:/app/portfolio
      - ./projects:/app/projects
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PUSHOVER_TOKEN=${PUSHOVER_TOKEN}
      - PUSHOVER_USER=${PUSHOVER_USER}

  caddy:
    # Built locally via caddy.Dockerfile, then pushed to ghcr.io.
    # Rebuild + push only when caddy.Dockerfile changes (see README).
    image: ghcr.io/hugobarros96/scheduling-caddy:ratelimit
    pull_policy: missing
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
