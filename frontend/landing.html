<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hugo Barros</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .landing {
      text-align: center;
    }
    .landing h1 {
      font-size: 2rem;
      margin-bottom: 2rem;
      font-weight: 600;
    }
    .landing a {
      display: inline-block;
      padding: 14px 40px;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .landing a:hover {
      background: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>hugobarros.cc</h1>
    <a href="/scheduler">Scheduler</a>
  </div>
</body>
</html>
